<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380" width="300" height="380">
  <defs>
    <radialGradient id="smoke" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a6bcc"/>
      <stop offset="40%" stop-color="#0d4fa0"/>
      <stop offset="100%" stop-color="#071e4a"/>
    </radialGradient>
    <radialGradient id="smoke2" cx="30%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#2d8ce8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#071e4a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="smoke3" cx="70%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#4ab0f5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#071e4a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="380" fill="url(#smoke)" rx="12"/>
  <rect width="300" height="380" fill="url(#smoke2)" rx="12"/>
  <rect width="300" height="380" fill="url(#smoke3)" rx="12"/>

  <!-- Wispy smoke blobs -->
  <ellipse cx="60" cy="200" rx="55" ry="80" fill="#3a9de8" fill-opacity="0.12" transform="rotate(-15 60 200)"/>
  <ellipse cx="240" cy="160" rx="45" ry="70" fill="#4ab8f5" fill-opacity="0.1" transform="rotate(20 240 160)"/>
  <ellipse cx="150" cy="310" rx="70" ry="40" fill="#2880d0" fill-opacity="0.15"/>
  <ellipse cx="80" cy="100" rx="40" ry="60" fill="#5ac0ff" fill-opacity="0.08" transform="rotate(10 80 100)"/>
  <ellipse cx="220" cy="280" rx="50" ry="35" fill="#2880d0" fill-opacity="0.1"/>

  <!-- SAY MY NAME text -->
  <text x="150" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#0a1e40" letter-spacing="6" opacity="0.85">SAY MY NAME</text>

  <!-- ── Hat ── -->
  <!-- Brim -->
  <ellipse cx="150" cy="130" rx="82" ry="16" fill="#0d1c35"/>
  <!-- Crown -->
  <path d="M82 130 Q80 72 150 62 Q220 72 218 130 Z" fill="#0d1c35"/>
  <!-- Crown highlight -->
  <path d="M95 125 Q93 78 150 70 Q150 68 108 82 Q93 100 95 125 Z" fill="#1a3060" fill-opacity="0.4"/>
  <!-- Hat band -->
  <rect x="82" y="120" width="136" height="10" rx="0" fill="#071428"/>

  <!-- ── Glasses ── -->
  <!-- Left lens -->
  <ellipse cx="121" cy="175" rx="24" ry="14" fill="none" stroke="#0d1c35" stroke-width="3.5"/>
  <!-- Right lens -->
  <ellipse cx="179" cy="175" rx="24" ry="14" fill="none" stroke="#0d1c35" stroke-width="3.5"/>
  <!-- Bridge -->
  <line x1="145" y1="175" x2="155" y2="175" stroke="#0d1c35" stroke-width="3.5"/>
  <!-- Left arm -->
  <line x1="97" y1="175" x2="78" y2="172" stroke="#0d1c35" stroke-width="3"/>
  <!-- Right arm -->
  <line x1="203" y1="175" x2="222" y2="172" stroke="#0d1c35" stroke-width="3"/>
  <!-- Eyebrows -->
  <path d="M100 162 Q121 156 142 162" fill="none" stroke="#0d1c35" stroke-width="4" stroke-linecap="round"/>
  <path d="M158 162 Q179 156 200 162" fill="none" stroke="#0d1c35" stroke-width="4" stroke-linecap="round"/>

  <!-- ── Goatee / Beard ── -->
  <!-- Mustache -->
  <path d="M126 202 Q140 196 150 200 Q160 196 174 202 Q165 210 150 207 Q135 210 126 202 Z" fill="#0d1c35"/>
  <!-- Beard body -->
  <path d="M128 210 Q130 215 135 215 Q140 218 150 220 Q160 218 165 215 Q170 215 172 210 Q165 230 162 248 Q157 260 150 262 Q143 260 138 248 Q135 230 128 210 Z" fill="#0d1c35"/>
  <!-- Soul patch gap -->
  <path d="M143 207 Q150 205 157 207 Q155 215 150 215 Q145 215 143 207 Z" fill="#0d1c35" fill-opacity="0.7"/>

  <!-- ── "Vapes" cursive ── -->
  <text x="150" y="330" text-anchor="middle" font-family="Palatino Linotype, Palatino, Book Antiqua, Georgia, serif" font-size="58" font-style="italic" font-weight="400" fill="#0a1e40" letter-spacing="2" opacity="0.9">Vapes</text>
</svg>
