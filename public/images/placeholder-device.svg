<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Device body -->
  <rect x="148" y="95" width="104" height="215" rx="18" fill="url(#body)"/>
  <rect x="148" y="95" width="30" height="215" rx="18" fill="url(#shine)"/>
  <!-- Screen -->
  <rect x="160" y="112" width="80" height="55" rx="6" fill="url(#screen)" fill-opacity="0.9"/>
  <!-- Screen inner content -->
  <rect x="168" y="120" width="48" height="6" rx="3" fill="white" fill-opacity="0.7"/>
  <rect x="168" y="132" width="32" height="4" rx="2" fill="white" fill-opacity="0.45"/>
  <rect x="168" y="142" width="40" height="4" rx="2" fill="white" fill-opacity="0.35"/>
  <!-- Fire button -->
  <rect x="244" y="128" width="12" height="38" rx="6" fill="#6d28d9"/>
  <!-- Coil ring -->
  <circle cx="200" cy="240" r="28" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="200" cy="240" r="18" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="200" cy="240" r="8" fill="white" fill-opacity="0.25"/>
  <!-- USB port -->
  <rect x="184" y="295" width="32" height="8" rx="4" fill="#6d28d9"/>
  <!-- LED dot -->
  <circle cx="200" cy="172" r="4" fill="white" fill-opacity="0.8"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="348" rx="44" ry="10" fill="#7c3aed" fill-opacity="0.15"/>
  <text x="200" y="386" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#7c3aed" fill-opacity="0.55" font-weight="600" letter-spacing="3">DEVICE</text>
</svg>
